<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Star Sports 1 HD — Clean Player</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        .video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Shaka UI Customization */
        .shaka-video-container {
            width: 100% !important;
            height: 100% !important;
        }
        
        .shaka-controls-container {
            z-index: 100 !important;
        }
        
        .shaka-bottom-controls {
            padding-bottom: env(safe-area-inset-bottom) !important;
        }
    </style>
</head>
<body>

    <div class="video-container" data-shaka-player-container>
        <video autoplay muted playsinline id="video" 
               poster="http://ttpl.tmsimg.com/assets/p27485133_b_h10_ab.jpg?lock=1280x720">
        </video>
    </div>

    <script>
        // Stream Configuration
        const streamConfig = {
            mpd: "https://bpaita2.akamaized.net/bpk-tv/irdeto_com_Channel_250/output/manifest.mpd",
            token: "hdntl=exp=1778174146~acl=%2fbpk-tv%2firdeto_com_Channel_250%2foutput%2f*~id=9905477177~data=hdntl~hmac=f314f484e2807a4180c97a703db83f1a745f138d08abf4650671a10070884006",
            referer: "https://www.tataplaybinge.com/",
            userAgent: "Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
            drm: {
                "06341bf3dd635e6ca5c71188d0210373": "2c6d9ccbf866eee8c42dcf9c343f179b"
            }
        };

        async function initPlayer() {
            shaka.polyfill.installAll();
            
            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported!');
                return;
            }

            const video = document.getElementById('video');
            const videoContainer = document.querySelector('[data-shaka-player-container]');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, videoContainer, video);

            // Configure Player
            player.configure({
                drm: { clearKeys: streamConfig.drm },
                streaming: {
                    bufferingGoal: 30,
                    rebufferingGoal: 15
                }
            });

            // Request Filters (Referer & Token)
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = streamConfig.referer;
                request.headers['User-Agent'] = streamConfig.userAgent;

                if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                     type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
                     !request.uris[0].includes('__hdnea')) {
                    const sep = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += sep + streamConfig.token;
                }
            });

            try {
                await player.load(streamConfig.mpd);
                console.log('Stream loaded successfully');
            } catch (error) {
                console.error('Error loading stream:', error);
            }
        }

        // Auto-play Fix
        document.addEventListener('DOMContentLoaded', () => {
            initPlayer();
            // Sound enable karne ke liye screen par click zaroori hai (Browser policy)
            document.body.addEventListener('click', () => {
                const video = document.getElementById('video');
                video.muted = false;
            }, { once: true });
        });
    </script>
</body>
</html>
