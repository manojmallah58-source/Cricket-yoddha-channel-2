<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.min.css" crossorigin="anonymous">
    <style>
        body { background-color: #000; margin: 0; }
        .video-container { position: relative; width: 100%; height: 100vh; background-color: black; }
    </style>
</head>
<body>

    <div class="video-container">
        <div data-shaka-player-container style="width: 100%; height: 100%;">
            <video autoplay muted data-shaka-player id="video" style="width:100%; height:100%;"></video>
        </div>
    </div>

    <script>
        async function init() {
            const video = document.getElementById("video");
            const ui = video.ui;
            const controls = ui.getControls();
            const player = controls.getPlayer();

            // DRM Configuration
            player.configure({
                drm: {
                    clearKeys: {
                        'f52a13486b5aa72569ab1e6b45e7ec29': '41611477a72a4b932513c0b824ccae06'
                    }
                }
            });

            try {
                await player.load("https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/orxueyvu1q/out/v1/4f512a0c1bf2470c875bf8b26b563c80/cenc.mpd");
                console.log("Video loaded successfully");
            } catch (error) {
                console.error("Error code", error.code, "object", error);
            }
        }

        document.addEventListener("shaka-ui-loaded", init);
    </script>
</body>
</html>
