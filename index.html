<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Sports 1 HD - Player</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #video-container {
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Customizing Shaka UI for better visibility */
        .shaka-video-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="video-container" data-shaka-player-container>
        <video autoplay playsinline data-shaka-player id="video" poster="http://ttpl.tmsimg.com/assets/p27485133_b_h10_ab.jpg?lock=1280x720"></video>
    </div>

    <script>
        const streamConfig = {
            mpd: "https://bpaita2.akamaized.net/bpk-tv/irdeto_com_Channel_250/output/manifest.mpd",
            token: "hdntl=exp=1778174146~acl=%2fbpk-tv%2firdeto_com_Channel_250%2foutput%2f*~id=9905477177~data=hdntl~hmac=f314f484e2807a4180c97a703db83f1a745f138d08appf4650671a10070884006",
            referer: "https://www.tataplaybinge.com/",
            userAgent: "Mozilla/5.0 (Linux; Android 13; SM-S918B) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
            drm: {
                "06341bf3dd635e6ca5c71188d0210373": "2c6d9ccbf866eee8c42dcf9c343f179b"
            }
        };

        async function initPlayer() {
            shaka.polyfill.installAll();
            if (!shaka.Player.isBrowserSupported()) {
                console.error('Browser not supported!');
                return;
            }

            const video = document.getElementById('video');
            const container = document.getElementById('video-container');
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, container, video);

            // Basic Player Configuration
            player.configure({
                drm: { clearKeys: streamConfig.drm },
                streaming: {
                    bufferingGoal: 30,
                    rebufferingGoal: 15
                }
            });

            // Request Filter for Token and Referer
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                request.headers['Referer'] = streamConfig.referer;
                request.headers['User-Agent'] = streamConfig.userAgent;
                
                if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                    type === shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    const separator = request.uris[0].includes('?') ? '&' : '?';
                    request.uris[0] += separator + streamConfig.token;
                }
            });

            try {
                await player.load(streamConfig.mpd);
                console.log('Video loaded successfully');
            } catch (error) {
                console.error('Error loading video:', error);
            }
        }

        // Handle Autoplay policy (User interaction might be needed for sound)
        document.addEventListener('DOMContentLoaded', initPlayer);
        document.addEventListener('touchstart', () => {
            const v = document.getElementById('video');
            if (v.paused) v.play();
        }, { once: true });

    </script>
</body>
</html>
