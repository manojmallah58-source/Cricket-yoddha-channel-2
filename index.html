<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Sonu // Live Stream</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/controls.css">
    <style>
        body { margin:0; background:#000; overflow:hidden; }
        .shaka-video-container { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
        video { width:100%; height:100%; object-fit:contain; }
    </style>
</head>
<body>

<div class="shaka-video-container" id="pc">
    <video id="v" autoplay playsinline crossorigin="anonymous"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.1.8/dist/shaka-player.ui.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const video = document.getElementById('v');
    const player = new shaka.Player(video);

    // FIX: Request Filter ko thoda aur smart banaya
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.cricbuzz.com/';
        request.headers['Origin'] = 'https://www.cricbuzz.com';
    });

    // FIX: Yahan hum ek lightweight CORS Proxy ka use kar rahe hain
    const TARGET_URL = 'https://otte.live.fly.ww.aiv-cdn.net/iad-nitro/live/clients/dash/enc/orxueyvu1q/out/v1/4f512a0c1bf2470c875bf8b26b563c80/cenc.mpd';
    const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(TARGET_URL);

    player.configure({
        drm: {
            clearKeys: { 'f52a13486b5aa72569ab1e6b45e7ec29': '41611477a72a4b932513c0b824ccae06' }
        }
    });

    try {
        await player.load(PROXY_URL);
    } catch (e) {
        console.error("Vercel Load Failed. Trying direct connection...");
        // Agar proxy fail ho toh fallback direct url
        await player.load(TARGET_URL);
    }
});
</script>
</body>
</html>
