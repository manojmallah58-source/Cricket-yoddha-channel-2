<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="utf-8"> 
<meta name="viewport" content="width=device-width,initial-scale=1"> 
<title>Star Sports HD 2 Live</title> 
<meta name="referrer" content="no-referrer"> 
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script> 
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/> 

<style> 
*{margin:0;padding:0;box-sizing:border-box} 
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif} 

.shaka-video-container{ 
position:fixed; 
inset:0; 
background:#000; 
display:flex; 
align-items:center; 
justify-content:center; 
} 

video{ 
width:100%; 
height:100%; 
object-fit:contain; 
background:#000; 
} 

.block-overlay{ 
position:fixed; 
inset:0; 
z-index:99999; 
display:flex; 
align-items:center; 
justify-content:center; 
background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
text-align:center; 
} 

.block-box{ 
padding:40px; 
max-width:500px; 
width:90%; 
background:rgba(20, 20, 20, 0.95); 
border-radius:16px; 
border:1px solid rgba(255, 255, 255, 0.1); 
box-shadow:0 20px 50px rgba(0,0,0,0.5); 
animation: fadeInUp 0.6s ease-out; 
} 

@keyframes fadeInUp { 
from { opacity: 0; transform: translateY(30px); } 
to { opacity: 1; transform: translateY(0); } 
} 

.block-title{ 
font-size:32px; 
font-weight:800; 
color:#ffffff; 
text-transform:uppercase; 
letter-spacing:2px; 
margin-bottom:20px; 
} 

.block-sub{ 
font-size:14px; 
font-weight:500; 
color:rgba(255, 255, 255, 0.6); 
line-height:1.6; 
} 
</style> 
</head> 
<body> 

<div class="shaka-video-container" id="player-container"> 
<video id="video" autoplay muted playsinline preload="metadata"></video> 
</div> 

<script> 
(function(){ 
// --- 1. CONFIGURATION (Updated with your details) ---
const CONFIG={ 
streamUrl:"https://jiotvpllive.cdn.jio.com/bpk-tv/Star_Sports_HD2_BTS/WDVLive/index.mpd", 
keyId:"9457eb90129456fa8ea95e10ba4ac51e", 
key:"e620a970cea474c491ac78ae71a4d764", 
userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:149.0) Gecko/20100101 Firefox/149.0",
manualCookie:"__hdnea__=st=1776590422~exp=1776612022~acl=/bpk-tv/Star_Sports_HD2_BTS/WDVLive/*~hmac=5e062243783d9af3805558af494e92c20250248a8d0cd72e2576eeba090ac5a2"
}; 

// --- 2. PLAYER LOGIC ---
function isSandboxedEnv(){ 
try { 
if (window.self === window.top) return false; 
if (window.frameElement && window.frameElement.hasAttribute("sandbox")) return true; 
return false; 
} catch(e) { return true; } 
} 

function triggerBlockScreen(title, message){ 
const container = document.getElementById("player-container"); 
const overlay = document.createElement("div"); 
overlay.className = "block-overlay"; 
overlay.innerHTML = `<div class="block-box"><div class="block-title">${title}</div><div class="block-sub">${message}</div></div>`; 
document.body.appendChild(overlay); 
container.style.display = 'none'; 
} 

if(isSandboxedEnv()){ 
triggerBlockScreen('Access Denied', 'Please open this link directly in a secure browser (Chrome/Firefox).'); 
return; 
} 

document.addEventListener("DOMContentLoaded",async()=>{ 
shaka.polyfill.installAll(); 
if(!shaka.Player.isBrowserSupported()) return; 

const video=document.getElementById("video"); 
const container=document.getElementById("player-container"); 

const player=new shaka.Player(); 
await player.attach(video); 

// UI Controls
const ui=new shaka.ui.Overlay(player,container,video); 
ui.configure({ 
addBigPlayButton: true, 
controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "fullscreen"] 
}); 

// DRM & Streaming Config
player.configure({ 
drm:{ clearKeys:{ [CONFIG.keyId]: CONFIG.key } }, 
manifest:{ defaultPresentationDelay: 5 }, 
streaming:{ lowLatencyMode: true, bufferingGoal: 10 } 
}); 

// Network Filters for Headers & Cookies
player.getNetworkingEngine().registerRequestFilter((type,request)=>{ 
request.headers["Referer"]="https://www.jiotv.com/"; 
request.headers["User-Agent"]=CONFIG.userAgent; 
request.headers["Cookie"]=CONFIG.manualCookie; 

// Append cookie to segments if not present
if((type===shaka.net.NetworkingEngine.RequestType.MANIFEST || 
    type===shaka.net.NetworkingEngine.RequestType.SEGMENT) && 
   !request.uris[0].includes("__hdnea__")){ 
    const sep = request.uris[0].includes("?") ? "&" : "?"; 
    request.uris[0] += sep + CONFIG.manualCookie; 
} 
}); 

try{ 
await player.load(CONFIG.streamUrl); 
video.play().catch(()=>{}); 
}catch(e){ console.error("Load Error", e); } 

video.addEventListener("play",()=>{ video.muted=false; }); 
}); 
})(); 
</script> 
</body> 
</html>
