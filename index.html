<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimo TV Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.player-container {
  position: relative;
  width: 100%;
  height: 100vh;
  background: black;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* Controls */
.controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 10;
}

.btn {
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 12px 15px;
  margin-left: 10px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="player-container" id="player">

  <iframe 
    id="nimoFrame"
    src="https://www.nimo.tv/embed/4049058852"
    sandbox="allow-scripts allow-same-origin allow-presentation allow-fullscreen"
    allow="fullscreen; autoplay"
    referrerpolicy="no-referrer">
  </iframe>

  <div class="controls">
    <button class="btn" onclick="goFullscreen()">⛶</button>
    <button class="btn" onclick="rotateScreen()">🔄</button>
  </div>

</div>

<script>
// Fullscreen function
function goFullscreen() {
  let elem = document.getElementById("player");

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
}

// Rotate screen (mobile)
async function rotateScreen() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      await screen.orientation.lock("landscape");
    } else {
      alert("Rotation not supported on this device/browser");
    }
  } catch (e) {
    alert("Rotate failed: " + e.message);
  }
}

// Iframe protection
document.getElementById("nimoFrame").addEventListener("load", function() {
  try {
    const iframeWindow = this.contentWindow;
    iframeWindow.open = function() {
      return null;
    };
  } catch(e) {
    // Cross-origin restriction is expected here
  }
});
</script>
  
</body>
</html>
